<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map View</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:#eef3ff;
}

.page{
position:relative;
min-height:100vh;
}

.back-btn{
position:fixed;
top:18px;
left:18px;
z-index:10;
text-decoration:none;
padding:10px 16px;
border-radius:10px;
background:rgba(255,255,255,0.95);
color:#1f3d8f;
font-weight:600;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

.map-frame{
width:100%;
height:100vh;
border:none;
background:#e9eef8;
}

.loading{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
color:#63708a;
font-size:18px;
background:#eef3ff;
}
</style>
</head>
<body>
<div class="page">
    <a class="back-btn" href="/user-dashboard">Back</a>
    <div id="loading" class="loading">Loading map...</div>
    <iframe id="mapFrame" class="map-frame" title="Showroom Map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

<script>
function mapQuery(showrooms){
if(!Array.isArray(showrooms) || !showrooms.length){
return "car showroom near me";
}

const first = showrooms[0];
return [first.name, first.address, first.city].filter(Boolean).join(", ") || "car showroom near me";
}

async function loadMap(){
try{
const res = await fetch("/user-panel/api/showrooms");
const data = await res.json();
const showrooms = data && data.ok && Array.isArray(data.showrooms) ? data.showrooms : [];
const query = mapQuery(showrooms);
document.getElementById("mapFrame").src = `https://www.google.com/maps?q=${encodeURIComponent(query)}&output=embed`;
}finally{
document.getElementById("loading").style.display = "none";
}
}

loadMap();
</script>
</body>
</html>
