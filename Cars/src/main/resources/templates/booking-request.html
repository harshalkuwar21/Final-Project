<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Booking - DK3 Cars</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c4ef6;
            --accent: #9f7bff;
            --dark: #1f2937;
            --light: #f5f6ff;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(108, 78, 246, 0.1), rgba(159, 123, 255, 0.15)),
                #f9fafb;
            display: grid;
            place-items: center;
            color: var(--dark);
        }

        .card {
            width: min(92vw, 760px);
            background: #fff;
            border-radius: 20px;
            padding: 28px 30px;
            box-shadow: 0 16px 40px rgba(31, 41, 55, 0.12);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 28px;
        }

        p {
            margin: 0 0 18px;
            color: #4b5563;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: #4b5563;
        }

        input,
        select,
        textarea {
            width: 100%;
            margin-top: 6px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .note {
            font-size: 13px;
            color: #6b7280;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            border: none;
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(108, 78, 246, 0.25);
        }

        .btn-light {
            background: var(--light);
            color: #4338ca;
        }

        .status {
            margin-top: 10px;
            font-weight: 600;
            font-size: 14px;
        }

        .status.success {
            color: #15803d;
        }

        .status.error {
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Request a Booking</h1>
        <p>Submit your details and we will confirm your booking after review.</p>

        <form id="bookingRequestForm">
            <div class="grid">
                <div>
                    <label for="name">Full Name</label>
                    <input id="name" name="name" type="text" placeholder="Your name" required>
                </div>
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="mobile">Mobile</label>
                    <input id="mobile" name="mobile" type="tel" maxlength="10" pattern="[0-9]{10}" inputmode="numeric" placeholder="10 digit mobile number" required>
                </div>
                <div>
                    <label for="carId">Select Car</label>
                    <select id="carId" name="carId" required>
                        <option value="">Choose a car</option>
                        <option th:each="car : ${cars}" th:value="${car.id}" th:text="${car.brand + ' ' + car.model}"></option>
                    </select>
                </div>
                <div>
                    <label for="bookingAmount">Booking Amount</label>
                    <input id="bookingAmount" name="bookingAmount" type="number" step="0.01" placeholder="10000">
                </div>
                <div>
                    <label for="paymentMode">Payment Mode</label>
                    <select id="paymentMode" name="paymentMode">
                        <option value="UPI">UPI</option>
                        <option value="Card">Card</option>
                        <option value="Cash">Cash</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
            </div>

            <div>
                <label for="address">Address (optional)</label>
                <textarea id="address" name="address" placeholder="Delivery address"></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Submit Booking</button>
                <button class="btn btn-light" type="button" onclick="location.href='/user-dashboard'">Back to Dashboard</button>
            </div>

            <div class="note">Your booking will appear as "WAITING" until staff confirms it.</div>
            <div id="statusMessage" class="status"></div>
        </form>
    </div>

    <script src="/js/booking-request.js"></script>
</body>
</html>
