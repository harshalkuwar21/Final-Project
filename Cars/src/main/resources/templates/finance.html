<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Finance Management</title>
    <link rel="stylesheet" href="/css/finance.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; font-family: 'Poppins', sans-serif; }
        .navbar { max-width: 1500px; margin: 20px auto; padding: 14px 28px; background: rgba(255,255,255,0.95); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 18px 45px rgba(0,0,0,0.1); position: sticky; top: 20px; z-index: 999; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; color: #333; }
        .logo img { width: 50px; height: 50px; border-radius: 10px; }
        .nav-icons { display: flex; gap: 15px; }
        .nav-icons i { font-size: 20px; cursor: pointer; color: #666; transition: 0.3s; }
        .nav-icons i:hover { color: #10b981; transform: scale(1.15); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-left: 4px solid #10b981; }
        .stat-card h4 { color: #666; font-size: 13px; margin-bottom: 8px; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: #10b981; }
        
        .container { max-width: 1400px; margin: 0 auto; display: flex; gap: 24px; padding: 20px; }
        aside.sidebar { width: 240px; background: linear-gradient(180deg, #fff, #f0f9ff); border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); height: fit-content; }
        .sidebar ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .sidebar li { padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; font-weight: 500; color: #333; }
        .sidebar li i { font-size: 16px; color: #10b981; }
        .sidebar li:hover { background: rgba(16,185,129,0.1); transform: translateX(4px); }
        .sidebar li.active { background: linear-gradient(135deg, #10b981, #34d399); color: #fff; }
        .sidebar li.active i { color: #fff; }
        
        main.main { flex: 1; padding: 0; }
        main h2 { color: #333; margin-bottom: 24px; font-size: 28px; }
        
        .panel { background: rgba(255,255,255,0.95); padding: 28px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-bottom: 24px; border: 1px solid rgba(16,185,129,0.1); }
        .panel h3 { color: #333; margin-bottom: 18px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .panel h3:before { content: ''; width: 4px; height: 20px; background: linear-gradient(135deg, #10b981, #34d399); border-radius: 2px; }
        
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; align-items: end; }
        .form-row input, .form-row select { padding: 12px 16px; border: 2px solid #e0f2f1; border-radius: 10px; font-size: 14px; transition: 0.3s; font-family: 'Poppins', sans-serif; }
        .form-row input:focus, .form-row select:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #10b981, #34d399); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.4); }
        .btn-danger { background: #ff5722; color: white; }
        .btn-danger:hover { background: #e64a19; transform: translateY(-2px); }
        .btn-edit { background: #2196F3; color: white; font-size: 12px; padding: 8px 14px; }
        .btn-edit:hover { background: #1976D2; }
        
        #msg { display: inline-block; padding: 8px 12px; border-radius: 6px; background: #e8f5e9; color: #2e7d32; font-size: 13px; }
        
        .payments-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .payments-table thead { background: linear-gradient(135deg, #f0fbf5, #f5fffb); }
        .payments-table th { padding: 14px 12px; text-align: left; font-weight: 600; color: #333; border: none; }
        .payments-table td { padding: 14px 12px; border-bottom: 1px solid #f0f0f0; }
        .payments-table tbody tr:hover { background: #fafbff; }
        .payments-table td button { margin-right: 6px; font-size: 12px; }
        
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-completed { background: #e8f5e9; color: #2e7d32; }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-failed { background: #ffebee; color: #c62828; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-body input, .modal-body select { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 2px solid #e0f2f1; border-radius: 10px; font-family: 'Poppins', sans-serif; }
        .modal-body input:focus, .modal-body select:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .close { float: right; font-size: 24px; font-weight: bold; color: #999; cursor: pointer; border: none; background: none; }
        .close:hover { color: #333; }
    </style>
</head>
<body>
<header class="navbar">
    <div class="logo"><img src="/images/logo.png" alt="logo"> DK3 Cars</div>
    <div class="nav-icons"><i class="fa fa-bell"></i><i class="fa fa-user-circle"></i></div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fas fa-tachometer-alt"></i>Return to Dashboard</li>
            <!-- <li onclick="location.href='/showrooms'"><i class="fas fa-car"></i> Showroom</li>
            <li onclick="location.href='/bookings'"><i class="fas fa-calendar-check"></i> Bookings</li>
            <li onclick="location.href='/sales'"><i class="fas fa-shopping-cart"></i> Sales</li>
            <li onclick="location.href='/customers'"><i class="fas fa-users"></i> Customers</li>
            <li onclick="location.href='/staff'"><i class="fas fa-user-tie"></i> Staff</li>
            <li class="active" onclick="location.href='/finance'"><i class="fas fa-money-bill-wave"></i> Finance</li>
            <li onclick="location.href='/documents'"><i class="fas fa-file-alt"></i> Documents</li>
            <li onclick="location.href='/reports'"><i class="fas fa-chart-bar"></i> Reports</li>
            <li onclick="location.href='/notifications'"><i class="fas fa-bell"></i> Notifications</li>
            <li onclick="location.href='/settings'"><i class="fas fa-cog"></i> Settings</li> -->
        </ul>
    </aside>

    <main class="main">
        <h2><i class="fas fa-coins"></i> Finance Management</h2>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Today's Collection</h4>
                <div class="value">₹<span id="todayCollection">0</span></div>
            </div>
            <div class="stat-card" style="border-left-color: #ff9f43;">
                <h4>Pending Payments</h4>
                <div class="value" style="color: #ff9f43;">₹<span id="pendingAmount">0</span></div>
            </div>
            <div class="stat-card" style="border-left-color: #2196F3;">
                <h4>Total Completed</h4>
                <div class="value" style="color: #2196F3;">₹<span id="totalCompleted">0</span></div>
            </div>
            <div class="stat-card" style="border-left-color: #9c27b0;">
                <h4>Total Transactions</h4>
                <div class="value" style="color: #9c27b0;"><span id="totalTransactions">0</span></div>
            </div>
        </div>

        <section class="panel">
            <h3><i class="fas fa-plus-circle"></i> Record Payment</h3>
            <div class="form-row">
                <input id="amount" type="number" placeholder="Amount" min="0" step="0.01" required>
                <select id="paymentMethod"><option value="Cash">Cash</option><option value="UPI">UPI</option><option value="Card">Card</option><option value="Bank Transfer">Bank Transfer</option></select>
                <select id="status"><option value="Completed">Completed</option><option value="Pending">Pending</option><option value="Failed">Failed</option><option value="Refunded">Refunded</option></select>
                <input id="transactionId" placeholder="Transaction ID">
                <input id="paymentDate" type="date">
                <button id="addBtn" class="btn btn-primary" onclick="addPayment()"><i class="fas fa-plus"></i> Add Payment</button>
                <span id="msg"></span>
            </div>
        </section>

        <section class="panel">
            <h3><i class="fas fa-list"></i> Recent Payments</h3>
            <div id="paymentsWrapper">
                <table class="payments-table" id="paymentsTable">
                    <thead><tr><th><i class="fas fa-hashtag"></i> ID</th><th><i class="fas fa-coins"></i> Amount</th><th><i class="fas fa-credit-card"></i> Method</th><th><i class="fas fa-calendar"></i> Date</th><th><i class="fas fa-info-circle"></i> Status</th><th><i class="fas fa-cogs"></i> Actions</th></tr></thead>
                    <tbody id="paymentsBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- Edit modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <button class="close" onclick="hideEdit()">✕</button>
        <div class="modal-body">
            <h3><i class="fas fa-edit"></i> Edit Payment</h3>
            <input id="eAmount" type="number" placeholder="Amount" min="0" step="0.01" required>
            <select id="ePaymentMethod"><option value="Cash">Cash</option><option value="UPI">UPI</option><option value="Card">Card</option><option value="Bank Transfer">Bank Transfer</option></select>
            <select id="eStatus"><option value="Completed">Completed</option><option value="Pending">Pending</option><option value="Failed">Failed</option><option value="Refunded">Refunded</option></select>
            <input id="eTransactionId" placeholder="Transaction ID">
            <input id="ePaymentDate" type="date">
            <div style="margin-top:16px; display: flex; gap: 10px;"><button class="btn btn-primary" id="eSaveBtn" onclick="saveEdit()"><i class="fas fa-save"></i> Save</button> <button onclick="hideEdit()" class="btn" style="background: #f0f0f0; color: #333;">Cancel</button></div>
        </div>
    </div>
</div>

<script src="/js/finance.js"></script>
</body>
</html>
