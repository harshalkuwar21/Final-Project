<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/css/typography.css">
    <meta charset="utf-8">
    <title>Finance Management</title>
    <link rel="stylesheet" href="/css/finance.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
          /* ================= ROOT ================= */
        :root {
            --primary: #6c4ef6;
            --primary-dark: #5536f3;
            --success: #2ecc71;
            --warning: #f5a623;
            --danger: #e74c3c;
            --accent: #9f7bff;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
        }

          
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(108, 78, 246, .1), rgba(159, 123, 255, .1));
        }

        body,
        .navbar,
        .sidebar,
        .main,
        .page-section {
            transition: background 0.4s ease, color 0.4s ease;
        }

        .navbar {
            max-width: 1500px;
            margin: 20px auto;
            padding: 16px 30px;
            background: var(--glass);
            border-radius: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 20px;
            z-index: 999;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            transition: .3s;
        }

        .logo img:hover {
            transform: rotate(10deg) scale(1.08);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: #000;
        }

        .logo-text span {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }

        .nav-icons {
            display: flex;
            gap: 15px;
        }

        .nav-icons i {
            font-size: 20px;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }

        .nav-icons i:hover {
            color: #10b981;
            transform: scale(1.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #10b981;
        }

        .stat-card h4 {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #10b981;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            padding: 20px;
        }

        aside.sidebar {
            width: 240px;
            background: linear-gradient(180deg, #fff, #f0f9ff);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .sidebar ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar li {
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
            color: #333;
        }

        .sidebar li i {
            font-size: 16px;
            color: #10b981;
        }

        .sidebar li:hover {
            background: rgba(16, 185, 129, 0.1);
            transform: translateX(4px);
        }

        .sidebar li.active {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: #fff;
        }

        .sidebar li.active i {
            color: #fff;
        }

        main.main {
            flex: 1;
            padding: 0;
        }

        main h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 28px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        .panel h3 {
            color: #333;
            margin-bottom: 18px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel h3:before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #10b981, #34d399);
            border-radius: 2px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            align-items: end;
        }

        .form-row input,
        .form-row select {
            padding: 12px 16px;
            border: 2px solid #e0f2f1;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
            font-family: var(--font-body);
        }

        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: #ff5722;
            color: white;
        }

        .btn-danger:hover {
            background: #e64a19;
            transform: translateY(-2px);
        }

        .btn-edit {
            background: #2196F3;
            color: white;
            font-size: 12px;
            padding: 8px 14px;
        }

        .btn-edit:hover {
            background: #1976D2;
        }

        #msg {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 13px;
        }

        .payments-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .payments-table thead {
            background: linear-gradient(135deg, #f0fbf5, #f5fffb);
        }

        .payments-table th {
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border: none;
        }

        .payments-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .payments-table tbody tr:hover {
            background: #fafbff;
        }

        .payments-table td button {
            margin-right: 6px;
            font-size: 12px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-completed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-pending {
            background: #fff3e0;
            color: #e65100;
        }

        .status-failed {
            background: #ffebee;
            color: #c62828;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-body input,
        .modal-body select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 2px solid #e0f2f1;
            border-radius: 10px;
            font-family: var(--font-body);
        }

        .modal-body input:focus,
        .modal-body select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .close {
            float: right;
            font-size: 24px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            border: none;
            background: none;
        }

        .close:hover {
            color: #333;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <img src="/images/logo.png" alt="DK3 Cars Logo">
            <div class="logo-text">DK3 CARS<span>Premium Showroom</span></div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <ul>
                <li onclick="location.href='/dashboard'"><i class="fas fa-tachometer-alt"></i>Return to Dashboard</li>
            </ul>
        </aside>

        <main class="main">
            <h2><i class="fas fa-coins"></i> Finance Management</h2>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Today's Collection</h4>
                    <div class="value">Rs. <span id="todayCollection">0</span></div>
                </div>
                <div class="stat-card" style="border-left-color: #ff9f43;">
                    <h4>Pending Payments</h4>
                    <div class="value" style="color: #ff9f43;">Rs. <span id="pendingAmount">0</span></div>
                </div>
                <div class="stat-card" style="border-left-color: #2196F3;">
                    <h4>Total Completed</h4>
                    <div class="value" style="color: #2196F3;">Rs. <span id="totalCompleted">0</span></div>
                </div>
                <div class="stat-card" style="border-left-color: #9c27b0;">
                    <h4>Total Transactions</h4>
                    <div class="value" style="color: #9c27b0;"><span id="totalTransactions">0</span></div>
                </div>
            </div>

            <section class="panel">
                <h3><i class="fas fa-plus-circle"></i> Record Payment</h3>
                <div class="form-row">
                    <input id="amount" type="number" placeholder="Amount" min="0" step="0.01" required>
                    <select id="paymentMethod">
                        <option value="Cash">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="Card">Card</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                    <select id="status">
                        <option value="Completed">Completed</option>
                        <option value="Pending">Pending</option>
                        <option value="Failed">Failed</option>
                        <option value="Refunded">Refunded</option>
                    </select>
                    <input id="transactionId" placeholder="Transaction ID">
                    <input id="paymentDate" type="date">
                    <button id="addBtn" class="btn btn-primary" onclick="addPayment()"><i class="fas fa-plus"></i> Add
                        Payment</button>
                    <span id="msg"></span>
                </div>
            </section>

            <section class="panel">
                <h3><i class="fas fa-list"></i> Recent Payments</h3>
                <div id="paymentsWrapper">
                    <table class="payments-table" id="paymentsTable">
                        <thead>
                            <tr>
                                <th><i class="fas fa-hashtag"></i> ID</th>
                                <th><i class="fas fa-coins"></i> Amount</th>
                                <th><i class="fas fa-credit-card"></i> Method</th>
                                <th><i class="fas fa-calendar"></i> Date</th>
                                <th><i class="fas fa-info-circle"></i> Status</th>
                                <th><i class="fas fa-cogs"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="hideEdit()">&times;</button>
            <div class="modal-body">
                <h3><i class="fas fa-edit"></i> Edit Payment</h3>
                <input id="eAmount" type="number" placeholder="Amount" min="0" step="0.01" required>
                <select id="ePaymentMethod">
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select>
                <select id="eStatus">
                    <option value="Completed">Completed</option>
                    <option value="Pending">Pending</option>
                    <option value="Failed">Failed</option>
                    <option value="Refunded">Refunded</option>
                </select>
                <input id="eTransactionId" placeholder="Transaction ID">
                <input id="ePaymentDate" type="date">
                <div style="margin-top:16px; display: flex; gap: 10px;"><button class="btn btn-primary" id="eSaveBtn"
                        onclick="saveEdit()"><i class="fas fa-save"></i> Save</button> <button onclick="hideEdit()"
                        class="btn" style="background: #f0f0f0; color: #333;">Cancel</button></div>
            </div>
        </div>
    </div>

    <script src="/js/finance.js"></script>
</body>

</html>
