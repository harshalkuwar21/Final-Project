<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reports</title>
    <link rel="stylesheet" href="/css/reports.css">
</head>
<body>
<header class="navbar">
    <div class="logo"><img src="/images/logo.png" alt="logo"> DK3 Cars</div>
    <div class="nav-icons">
            <i class="fa fa-bell"></i>
            <i class="fa fa-user-circle"></i>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'">Dashboard</li>
            <li onclick="location.href='/showrooms'">Showrooms</li>
            <li class="active">Sales</li>
            <li onclick="location.href='/staff'">Manage Staff</li>
            <li onclick="location.href='/reports'">Reports</li>
            <li onclick="location.href='/settings'">Settings</li>
        </ul>
    </aside>

    <main class="main">
        <h2>Reports</h2>

        <section class="panel">
            <h3>Summary</h3>
            <div class="summary-grid">
                <div class="card stat"><strong id="rTotalSales">0</strong><div class="meta">Total Sales</div></div>
                <div class="card stat"><strong id="rRevenue">₹0</strong><div class="meta">Revenue</div></div>
                <div class="card stat"><strong id="rVehicles">0</strong><div class="meta">Total Vehicles</div></div>
                <div class="card stat"><strong id="rSold">0</strong><div class="meta">Sold Cars</div></div>
            </div>
        </section>

        <section class="panel">
            <h3>Sales by Date Range</h3>
            <div class="form-row">
                <input type="date" id="fromDate">
                <input type="date" id="toDate">
                <button class="btn-primary" onclick="loadSalesRange()">Load</button>
                <button class="btn-secondary" onclick="exportSalesCsv()">Export CSV</button>
            </div>
            <div class="sales-table-wrapper"><table class="sales-table"><thead><tr><th>Date</th><th>Buyer</th><th>Car</th><th>Price</th><th>Status</th></tr></thead><tbody id="reportSalesBody"></tbody></table></div>
        </section>

        <section class="panel">
            <h3>Revenue by Month</h3>
            <div class="form-row">
                <select id="yearSelect"></select>
                <button class="btn-primary" onclick="loadRevenue()">Load</button>
            </div>
            <div id="revenueBars" class="bar-row"></div>
        </section>

        <section class="panel">
            <h3>Top Brands</h3>
            <div id="topBrandsList"></div>
        </section>

    </main>
</div>

<script src="/js/reports.js"></script>
</body>
</html>
