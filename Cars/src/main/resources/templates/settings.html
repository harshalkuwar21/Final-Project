<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Settings</title>
    <link rel="stylesheet" href="/css/settings.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<header class="navbar">
    <div class="logo">
        <img src="/images/logo.png" alt="logo"> DK3 Cars
    </div>
    <div class="nav-icons">
            <i class="fa fa-bell"></i>
            <i class="fa fa-user-circle"></i>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
            <li onclick="location.href='/showrooms'"><i class="fas fa-car"></i> Showroom</li>
            <li onclick="location.href='/bookings'"><i class="fas fa-calendar-check"></i> Bookings</li>
            <li onclick="location.href='/sales'"><i class="fas fa-shopping-cart"></i> Sales</li>
            <li onclick="location.href='/customers'"><i class="fas fa-users"></i> Customers</li>
            <li onclick="location.href='/staff'"><i class="fas fa-user-tie"></i> Staff</li>
            <li onclick="location.href='/finance'"><i class="fas fa-money-bill-wave"></i> Finance</li>
            <li onclick="location.href='/documents'"><i class="fas fa-file-alt"></i> Documents</li>
            <li onclick="location.href='/reports'"><i class="fas fa-chart-bar"></i> Reports</li>
            <li onclick="location.href='/notifications'"><i class="fas fa-bell"></i> Notifications</li>
            <li class="active" onclick="location.href='/settings'"><i class="fas fa-cog"></i> Settings</li>
        </ul>
    </aside>

    <main class="main">
        <h2>Application Settings</h2>

        <section class="panel">
            <h3>Add / Update Setting</h3>
            <div class="form-row">
                <input id="newName" placeholder="Setting name (e.g., siteTitle)">
                <input id="newValue" placeholder="Value">
                <button id="addBtn" class="btn-primary" onclick="saveSetting()">Add</button>
                <span id="sMsg" style="margin-left:8px;color:#666"></span>
            </div>
        </section>

        <section class="panel">
            <h3>Current Settings</h3>
            <div id="settingsWrapper">
                <table class="settings-table">
                    <thead><tr><th>Name</th><th>Value</th><th>Actions</th></tr></thead>
                    <tbody id="settingsBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="/js/settings.js"></script>
</body>
</html>
