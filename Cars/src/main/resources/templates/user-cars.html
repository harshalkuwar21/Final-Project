<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/typography.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Cars</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Better Font -->

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: var(--font-body);
background:linear-gradient(120deg,#eef3ff,#f9fbff);
color:#1a2b4b;
}

.wrap{
max-width:1200px;
margin:auto;
padding:20px;
}

/* Top Bar */

.top{
background:#fff;
padding:16px 20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.top h2{
font-weight:600;
}

.top a{
text-decoration:none;
background:#eef4ff;
color:#005bbb;
padding:8px 14px;
border-radius:8px;
font-size:14px;
}

/* Filters */

.filters{
margin-top:16px;
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.07);

display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #dce4f5;
font-family: var(--font-body);
}

/* Button */

button{
border:none;
border-radius:8px;
padding:10px;
font-family: var(--font-body);
font-weight:500;
cursor:pointer;
background:linear-gradient(135deg,#005bbb,#0077ff);
color:white;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

/* Compare Section */

.compare{
margin-top:16px;
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.07);
}

.compare-head{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:14px;
flex-wrap:wrap;
}

.compare-title{
font-size:20px;
font-weight:700;
display:flex;
align-items:center;
gap:10px;
}

.compare-title i{
color:#005bbb;
}

.compare-note{
margin-top:6px;
font-size:13px;
color:#63758f;
line-height:1.6;
}

.compare-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.compare-result{
margin-top:16px;
}

.compare-empty{
border:1px dashed #cdd8ee;
border-radius:14px;
padding:16px;
background:#f8fbff;
font-size:13px;
color:#5f6f88;
}

.compare-winner{
padding:18px;
border-radius:16px;
background:linear-gradient(135deg,#e8f1ff,#f7fbff);
border:1px solid #d6e4ff;
margin-bottom:14px;
}

.compare-winner h4{
font-size:18px;
margin-bottom:8px;
display:flex;
align-items:center;
gap:10px;
}

.winner-chip{
display:inline-flex;
align-items:center;
gap:8px;
padding:7px 12px;
border-radius:999px;
background:#005bbb;
color:#fff;
font-size:12px;
font-weight:600;
margin-bottom:10px;
}

.compare-reasons{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.compare-reasons span{
padding:8px 12px;
border-radius:999px;
background:#fff;
color:#20406f;
font-size:12px;
font-weight:600;
border:1px solid #d8e3f5;
}

.compare-cta{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.compare-cta a{
text-decoration:none;
padding:10px 14px;
border-radius:10px;
font-size:13px;
font-weight:600;
}

.compare-cta .primary-link{
background:linear-gradient(135deg,#005bbb,#0077ff);
color:#fff;
}

.compare-cta .secondary-link{
background:#eef5ff;
color:#1f4b88;
}

.compare-grid{
display:grid;
grid-template-columns:200px 1fr 1fr;
gap:10px;
}

.compare-cell{
padding:14px;
border-radius:14px;
background:#f8fbff;
border:1px solid #dce6f5;
}

.compare-cell.label{
background:#eef5ff;
font-weight:700;
color:#234a85;
}

.compare-cell.better{
background:linear-gradient(135deg,#ebfff7,#f7fffc);
border-color:#93dec0;
box-shadow:inset 0 0 0 1px rgba(7,134,91,0.08);
}

.compare-car-name{
font-weight:700;
font-size:15px;
margin-bottom:6px;
}

.compare-check{
margin-top:8px;
display:inline-flex;
align-items:center;
gap:8px;
padding:7px 11px;
border-radius:999px;
background:#eef5ff;
font-size:13px;
color:#244b86;
}

.compare-check input{
margin:0;
}

/* Grid */

.grid{
margin-top:18px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:16px;
}

/* Card */

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 16px 32px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.heart-btn{
position:absolute;
top:14px;
right:14px;
width:42px;
height:42px;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.96);
color:#5d6882;
cursor:pointer;
font-size:18px;
box-shadow:0 8px 18px rgba(0,0,0,0.14);
transition:0.25s;
}

.heart-btn.active{
background:#fff0f5;
color:#e54579;
}

/* Content */

.content{
padding:16px;
}

.content h3{
font-size:18px;
margin-bottom:6px;
}

.line{
font-size:13px;
color:#6b7b93;
margin:4px 0;
}

/* Buttons */

.actions{
margin-top:12px;
display:flex;
gap:8px;
}

.actions a{
flex:1;
text-align:center;
text-decoration:none;
padding:9px;
border-radius:8px;
font-size:13px;
font-weight:500;
}

.btn-light{
background:#eef5ff;
color:#005bbb;
}

.btn-buy{
background:linear-gradient(135deg,#005bbb,#0077ff);
color:#fff;
}

.btn-buy:hover{
opacity:0.9;
}

@media(max-width:768px){
.compare-grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="wrap">

<div class="top">
<h2 id="carsTitle">View All Cars</h2>
<a href="/user-dashboard">Back to Dashboard</a>
</div>

<div class="filters">

<input id="brand" placeholder="Brand (Hyundai)">

<select id="fuelType">
<option value="">All Fuel Type</option>
<option>Petrol</option>
<option>Diesel</option>
<option>EV</option>
<option>CNG</option>
</select>

<input id="minPrice" type="number" placeholder="Min Price">
<input id="maxPrice" type="number" placeholder="Max Price">

<button onclick="loadCars()">Search Cars</button>

</div>

<div class="compare">
<div class="compare-head">
<div>
<div class="compare-title"><i class="fa-solid fa-scale-balanced"></i> Compare Two Cars</div>
<div class="compare-note">Select exactly 2 cars from inventory and we will show side-by-side details with which one looks better overall.</div>
</div>
<div class="compare-actions">
<button type="button" onclick="compareSelected()">Compare Selected</button>
</div>
</div>

<div id="compareResult" class="compare-result"></div>

</div>

<div id="carsGrid" class="grid"></div>

</div>

<script>

const LIKED_CARS_KEY="dk3-liked-cars";

function getStoredLikedCars(){
try{
const parsed=JSON.parse(localStorage.getItem(LIKED_CARS_KEY) || "[]");
return Array.isArray(parsed) ? parsed.map(Number).filter(Number.isFinite) : [];
}catch(e){
return [];
}
}

function saveLikedCars(ids){
localStorage.setItem(LIKED_CARS_KEY, JSON.stringify(ids));
}

function isLiked(carId){
return getStoredLikedCars().includes(Number(carId));
}

function formatCarPrice(value){
const amount=Number(value||0);
if(!Number.isFinite(amount) || amount<=0) return "Price on request";
if(amount>=10000000) return `Rs ${(amount/10000000).toFixed(2)} Crore`;
return `Rs ${(amount/100000).toFixed(2)} Lakh`;
}

function comparePlaceholder(message){
return `<div class="compare-empty"><i class="fa-regular fa-hand-pointer"></i> ${message}</div>`;
}

function carName(car){
return `${car.brand || ""} ${car.model || ""}`.trim();
}

function handleCompareSelection(input){
const selected=[...document.querySelectorAll(".cmp:checked")];
if(selected.length>2){
input.checked=false;
alert("Please select only 2 cars for comparison.");
return;
}
if(selected.length<2){
document.getElementById("compareResult").innerHTML=comparePlaceholder("Pick one more car to unlock the full comparison.");
}
}

function renderCompareResult(data){
const first=data.cars[0];
const second=data.cars[1];
const summary=data.summary || {};
const rows=Array.isArray(data.comparison) ? data.comparison : [];
const reasonHtml=(summary.reasons || []).map(reason=>`<span>${reason}</span>`).join("");
const ctaHtml=summary.draw ? `
<div class="compare-cta">
<a class="secondary-link" href="/user-panel/car-details?carId=${first.id}">View ${carName(first)}</a>
<a class="secondary-link" href="/user-panel/car-details?carId=${second.id}">View ${carName(second)}</a>
</div>
` : `
<div class="compare-cta">
<a class="primary-link" href="/user-panel/car-details?carId=${summary.winnerId}">View Better Car Details</a>
</div>
`;

document.getElementById("compareResult").innerHTML=`
<div class="compare-winner">
<div class="winner-chip"><i class="fa-solid fa-trophy"></i> ${summary.draw ? "Balanced Match" : "Recommended Pick"}</div>
<h4>${summary.draw ? '<i class="fa-solid fa-equals"></i>' : '<i class="fa-solid fa-medal"></i>'}${summary.winnerName || "Comparison Result"}</h4>
<div>${summary.headline || "Comparison is ready."}</div>
<div class="compare-reasons">${reasonHtml || "<span>Both cars perform closely on the selected details.</span>"}</div>
${ctaHtml}
</div>
<div class="compare-grid">
<div class="compare-cell label">Details</div>
<div class="compare-cell">
<div class="compare-car-name">${carName(first)}</div>
<div>${formatCarPrice(first.price)}</div>
</div>
<div class="compare-cell">
<div class="compare-car-name">${carName(second)}</div>
<div>${formatCarPrice(second.price)}</div>
</div>
${rows.map(row=>`
<div class="compare-cell label">${row.label}</div>
<div class="compare-cell ${row.winner===first.id ? "better" : ""}">${row.firstValue || "N/A"}</div>
<div class="compare-cell ${row.winner===second.id ? "better" : ""}">${row.secondValue || "N/A"}</div>
`).join("")}
</div>
`;
}

function toggleLike(carId,btn){
let likedIds=getStoredLikedCars();
const numericId=Number(carId);
const alreadyLiked=likedIds.includes(numericId);

likedIds=alreadyLiked
? likedIds.filter(id=>id!==numericId)
: [...likedIds,numericId];

saveLikedCars(likedIds);
btn.classList.toggle("active", !alreadyLiked);
btn.innerHTML=`<span>${!alreadyLiked ? "&#9829;" : "&#9825;"}</span>`;
btn.title=!alreadyLiked ? "Remove from liked cars" : "Add to liked cars";
}

/* same JS you already wrote */

function applyUrlFilters(){
const params=new URLSearchParams(window.location.search);

["brand","fuelType","minPrice","maxPrice"].forEach(id=>{
if(params.get(id)) document.getElementById(id).value=params.get(id);
});

}

async function loadCars(){

const params=new URLSearchParams();

["brand","fuelType","minPrice","maxPrice"].forEach(id=>{
const v=document.getElementById(id).value.trim();
if(v) params.append(id,v);
});

const res=await fetch("/user-panel/api/cars?"+params.toString());
const data=await res.json();

const grid=document.getElementById("carsGrid");

if(!data.ok || !data.cars.length){
grid.innerHTML="<div>No cars found.</div>";
return;
}

grid.innerHTML=data.cars.map(car=>`

<div class="card">

<button class="heart-btn ${isLiked(car.id) ? "active" : ""}" type="button" onclick="toggleLike(${car.id},this)" title="${isLiked(car.id) ? "Remove from liked cars" : "Add to liked cars"}">
${isLiked(car.id) ? "&#9829;" : "&#9825;"}
</button>

<img src="${(car.imageUrls && car.imageUrls.length)?car.imageUrls[0]:'/images/car.jpg'}">

<div class="content">

<h3>${car.brand} ${car.model}</h3>

<div class="line"><b>Price:</b> ${formatCarPrice(car.price)}</div>
<div class="line"><b>Fuel:</b> ${car.fuelType}</div>
<div class="line"><b>Transmission:</b> ${car.transmission}</div>
<div class="line"><b>Mileage:</b> ${car.mileage||"-"}</div>
<div class="line"><b>Showroom:</b> ${car.showroom?car.showroom.name:"-"}</div>

<div style="margin-top:8px">
<label class="compare-check"><input type="checkbox" class="cmp" value="${car.id}" onchange="handleCompareSelection(this)"> Compare this car</label>
</div>

<div class="actions">

<a href="/user-panel/car-details?carId=${car.id}" class="btn-light">Details</a>

<a href="/user-panel/buy-now?carId=${car.id}" class="btn-buy">Buy Now</a>

</div>

</div>

</div>

`).join("");

}

async function compareSelected(){

const ids=[...document.querySelectorAll(".cmp:checked")].map(x=>x.value);

if(ids.length!==2) return alert("Select exactly 2 cars");

const body=new URLSearchParams();

ids.forEach(id=>body.append("carIds",id));

const res=await fetch("/user-panel/api/compare",{method:"POST",body});

const data=await res.json();

if(!data.ok){
document.getElementById("compareResult").innerHTML=comparePlaceholder(data.error || "Unable to compare the selected cars.");
return;
}

renderCompareResult(data);

}

document.getElementById("compareResult").innerHTML=comparePlaceholder("Choose any 2 cars from below to compare their key details.");
applyUrlFilters();
loadCars();

</script>

</body>
</html>
