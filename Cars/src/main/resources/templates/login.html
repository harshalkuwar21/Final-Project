<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DK3 Cars | Login</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <img th:src="@{/images/logo.png}" alt="Logo">
</nav>

<div class="wrapper">
    <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>
        <p id="msg" style="text-align:center;font-size:13px;"></p>

        <form id="loginForm">
            <div class="input-group">
                <span>✉️</span>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <span>🔒</span>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn">Login</button>

            <p class="login" style="margin-top:10px;">
                <a href="#" id="forgotLink">Forgot Password?</a>
            </p>

            <div id="forgotBox" style="display:none; margin-top:10px;">
                <div class="input-group">
                    <span>✉️</span>
                    <input type="email" id="fpEmail" placeholder="Registered Email">
                </div>
                <div class="input-group">
                    <span>OTP</span>
                    <input type="text" id="fpOtp" placeholder="OTP">
                </div>
                <div class="input-group">
                    <span>New</span>
                    <input type="password" id="fpNewPassword" placeholder="New Password">
                </div>
                <button type="button" class="btn" id="sendOtpBtn" style="margin-top:6px;">Send OTP</button>
                <button type="button" class="btn" id="resetPwdBtn" style="margin-top:6px;">Verify OTP and Reset</button>
            </div>

            <p class="login">
                Do not have an account? <a href="/register">Register</a>
            </p>
        </form>
    </div>
</div>
<script th:src="@{/js/login.js}" defer></script>
</body>
</html>
