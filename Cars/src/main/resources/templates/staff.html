<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/css/typography.css">
    <meta charset="utf-8">
    <title>Manage Staff</title>
    <link rel="stylesheet" href="/css/staff.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<header class="navbar">
    <div class="logo">
        <img src="/images/logo.png" alt="logo"> DK3 Cars
    </div>
    <div class="nav-icons">
            <i class="fa fa-bell"></i>
            <i class="fa fa-user-circle"></i>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fa fa-home"></i> Dashboard</li>
            <li onclick="location.href='/showrooms'"><i class="fas fa-shop"></i> Showroom</li>
            <li onclick="location.href='/bookings'"><i class="fas fa-calendar-check"></i> Bookings</li>
            <li onclick="location.href='/sales'"><i class="fas fa-shopping-cart"></i> Sales</li>
            <li onclick="location.href='/customers'"><i class="fas fa-users"></i> Customers</li>
            <li class="active" onclick="location.href='/staff'"><i class="fas fa-user-tie"></i> Staff</li>
            <li onclick="location.href='/finance'"><i class="fas fa-money-bill-wave"></i> Finance</li>
            <li onclick="location.href='/documents'"><i class="fas fa-file-alt"></i> Documents</li>
            <li onclick="location.href='/reports'"><i class="fas fa-chart-bar"></i> Reports</li>
            <li onclick="location.href='/notifications'"><i class="fas fa-bell"></i> Notifications</li>
                <li class="logout" id="logoutBtn">
                    <i class="fas fa-right-from-bracket"></i>
                    <span>Logout</span>
                </li>

            
        </ul>
    </aside>

    <main class="main">
        <h2>Staff Management</h2>

        <section class="panel">
            <h3>Add Staff</h3>
            <div class="form-row">
                <input id="sFirst" placeholder="First name">
                <input id="sLast" placeholder="Last name">
                <input id="sEmail" placeholder="Email">
                <input id="sContact" type="tel" maxlength="10" pattern="[0-9]{10}" inputmode="numeric" placeholder="Contact">
                <select id="sRole"><option>ROLE_STAFF</option><option>ROLE_ADMIN</option></select>
                <select id="sShowroomId"><option value="">No Showroom</option></select>
                <input id="sPassword" placeholder="Password (optional)">
                <button id="sAddBtn" class="btn-primary" onclick="addStaff()">Add Staff</button>
                <span id="sMsg" style="margin-left:8px;color:#666"></span>
            </div>
        </section>

        <section class="panel">
            <h3>Existing Staff</h3>
            <div id="staffTableWrapper">
                <table class="staff-table">
                    <thead><tr><th>Name</th><th>Email</th><th>Contact</th><th>Role</th><th>Showroom</th><th>Actions</th></tr></thead>
                    <tbody id="staffBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal" style="display:none">
    <div class="modal-content">
        <button class="close" onclick="hideEdit()">&times;</button>
        <div class="modal-body">
            <h3>Edit Staff</h3>
            <input id="eFirst" placeholder="First">
            <input id="eLast" placeholder="Last">
            <input id="eContact" type="tel" maxlength="10" pattern="[0-9]{10}" inputmode="numeric" placeholder="Contact">
            <select id="eRole"><option>ROLE_STAFF</option><option>ROLE_ADMIN</option></select>
            <select id="eShowroomId"><option value="">No Showroom</option></select>
            <label><input type="checkbox" id="eEnabled"> Enabled</label>
            <input id="ePassword" placeholder="New password (optional)">
            <div style="margin-top:8px;"><button class="btn-primary" id="eSaveBtn">Save</button> <button onclick="hideEdit()" class="btn-secondary">Cancel</button></div>
        </div>
    </div>
</div>

<script src="/js/staff.js"></script>
</body>
</html>
