<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Showroom Vehicles - DK3 Cars</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/cars.css">
    <style>
       @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

:root{
    --primary:#6c4ef6;
    --accent:#9f7bff;
    --bg:#f5f7ff;
    --card:#ffffff;
    --glass:rgba(255,255,255,0.85);
    --shadow:0 15px 40px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#eef2ff,#f6f4ff);
color:#333;
}



/* NAVBAR */

.navbar{
max-width:1500px;
margin:25px auto;
padding:16px 30px;
background:var(--glass);
backdrop-filter:blur(10px);
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow);
}

.logo{
display:flex;
align-items:center;
gap:14px;
font-size:24px;
font-weight:600;
color:#222;
}

.logo img{
transition:.3s;
}

.logo img:hover{
transform:rotate(8deg) scale(1.05);
}

.nav-icons i{
font-size:20px;
margin-left:16px;
padding:10px;
border-radius:50%;
cursor:pointer;
transition:.3s;
}

.nav-icons i:hover{
background:#eef1ff;
color:var(--primary);
}



/* SIDEBAR */

.sidebar{
width:230px;
background:var(--glass);
border-radius:20px;
padding:20px;
box-shadow:var(--shadow);
height:fit-content;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:13px 16px;
margin:8px 0;
border-radius:12px;
cursor:pointer;
font-weight:500;
display:flex;
gap:10px;
align-items:center;
transition:.25s;
}

.sidebar li:hover{
background:rgba(108,78,246,.1);
transform:translateX(5px);
}

.sidebar li.active{
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
}



/* MAIN */

.main{
flex:1;
background:var(--bg);
border-radius:26px;
padding:32px;
box-shadow:var(--shadow);
}



/* BUTTON */

.btn{
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
font-size:14px;
font-weight:500;
border:none;
cursor:pointer;
transition:.3s;
display:inline-flex;
align-items:center;
gap:6px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(108,78,246,.35);
}



/* CAR GRID */

.car-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:22px;
}



/* CAR CARD */

.car-card{
background:var(--card);
border-radius:16px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,.07);
transition:.3s;
position:relative;
overflow:hidden;
}

.car-card:hover{
transform:translateY(-8px);
box-shadow:0 18px 40px rgba(0,0,0,.15);
}



/* IMAGE */

.car-image{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
transition:.4s;
}

.car-card:hover .car-image{
transform:scale(1.05);
}



/* DETAILS */

.car-details h3{
margin-bottom:8px;
font-size:18px;
color:var(--primary);
}

.car-details p{
font-size:13px;
margin:5px 0;
color:#555;
}



/* INFO GRID */

.car-info-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
padding-top:12px;
border-top:1px solid #eee;
}

.info-item{
font-size:12px;
}

.info-label{
color:#888;
font-weight:600;
}

.info-value{
color:#333;
font-weight:500;
}



/* ACTION BUTTONS */

.car-actions{
display:flex;
gap:10px;
margin-top:16px;
}

.car-actions a{
flex:1;
text-align:center;
padding:8px;
border-radius:6px;
font-size:13px;
font-weight:500;
text-decoration:none;
transition:.25s;
}

.edit-btn{
background:#2196F3;
color:white;
}

.edit-btn:hover{
background:#1976d2;
}

.delete-btn{
background:#f44336;
color:white;
}

.delete-btn:hover{
background:#d32f2f;
}



/* STATUS */

.status-available{
color:#22c55e;
font-weight:600;
}

.status-sold{
color:#ef4444;
font-weight:600;
}

.status-other{
color:#f59e0b;
font-weight:600;
}



/* BREADCRUMB */

.breadcrumb{
margin-bottom:20px;
font-size:14px;
color:#777;
}

.breadcrumb a{
color:var(--primary);
text-decoration:none;
font-weight:500;
}

.breadcrumb a:hover{
text-decoration:underline;
}



/* EMPTY STATE */

.empty{
text-align:center;
padding:50px;
color:#666;
}

.empty i{
font-size:50px;
color:#ccc;
margin-bottom:20px;
}
    </style>
</head>
<body>
<header class="navbar">
    <div class="logo">
        <img src="/images/logo.png" alt="logo" style="width: 60px; height: 60px; border-radius: 10px;">
        DK3 Cars
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell"></i>
        <i class="fas fa-user-circle"></i>
    </div>
</header>

<div class="container" style="display: flex; gap: 30px; max-width: 1500px; margin: 0 auto; padding: 0 20px;">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fa fa-home"></i> Dashboard</li>
            
            <li class="active"><i class="fas fa-store"></i> Showroom View</li>
        </ul>
    </aside>

    <main class="main">
        <div class="breadcrumb">
            <a href="/cars/all"><i class="fas fa-home"></i> All Vehicles</a> <span th:text="'Showroom #' + ${showroomId}"></span>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2><i class="fas fa-store"></i> Vehicles in Showroom</h2>
            <a href="/cars/add" class="btn" style="background: #6c4ef6; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;border: none;cursor: pointer;"><i class="fas fa-plus"></i> Add Vehicle</a>
        </div>

        <div th:if="${showroomAllocationError}" style="background:#fee2e2; color:#991b1b; padding:10px; border-radius:8px; margin-bottom:16px;">
            <span th:text="${showroomAllocationError}"></span>
        </div>

        <section class="panel">
            <div id="carGrid" class="car-grid">
                <div th:each="car : ${cars}" class="car-card">
                    <img th:if="${car.imageUrls != null and !car.imageUrls.isEmpty()}"
                         th:src="${car.imageUrls[0]}" alt="Car Image" class="car-image">
                    <img th:unless="${car.imageUrls != null and !car.imageUrls.isEmpty()}"
                         src="/images/placeholder-car.jpg" alt="Car Image" class="car-image">

                    <div class="car-details">
                        <h3 th:text="${car.brand + ' ' + car.model}"></h3>
                        <p><strong>Variant:</strong> <span th:text="${car.variant ?: 'N/A'}"></span></p>
                        <p><strong>Fuel:</strong> <span th:text="${car.fuelType}"></span></p>
                        <p><strong>Transmission:</strong> <span th:text="${car.transmission ?: 'N/A'}"></span></p>
                        <p><strong>Color:</strong> <span th:text="${car.color ?: 'N/A'}"></span></p>
                        <p><strong>Price:</strong> ₹<span th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 2, 'POINT')}"></span></p>

                        <div class="car-info-group">
                            <div class="info-item">
                                <div class="info-label">Status</div>
                                <div th:class="${'info-value ' + (car.status == 'Available' ? 'status-available' : car.status == 'Sold' ? 'status-sold' : 'status-other')}"
                                     th:text="${car.status}"></div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Stock</div>
                                <div class="info-value" th:text="${car.stockQuantity}"></div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">VIN</div>
                                <div class="info-value" th:text="${car.vin ?: 'N/A'}"></div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Engine No</div>
                                <div class="info-value" th:text="${car.engineNo ?: 'N/A'}"></div>
                            </div>
                        </div>

                        <div th:if="${car.supplierInfo}" class="info-item" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee;">
                            <div class="info-label">Supplier</div>
                             <div class="info-value" th:text="${car.supplierInfo}"></div>
                        </div>

                        <div th:if="${car.purchaseDate}" class="info-item" style="margin-top: 4px;">
                            <div class="info-label">Purchase Date</div>
                            <div class="info-value" th:text="${#temporals.format(car.purchaseDate, 'dd-MMM-yyyy')}"></div>
                        </div>
                    </div>

                    <div class="car-actions">
                        <a th:href="@{/cars/edit/{id}(id=${car.id})}" class="btn edit-btn" style="text-decoration: none; text-align: center;">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                        <a th:href="@{/cars/delete/{id}(id=${car.id})}" class="btn delete-btn"
                           onclick="return confirm('Are you sure?')"
                           style="text-decoration: none; text-align: center;">
                            <i class="fas fa-trash"></i> Delete
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(cars)}" style="text-align: center; padding: 50px; color: #666;">
                <i class="fas fa-car-side" style="font-size: 48px; color: #ccc; margin-bottom: 20px;"></i>
                <h3>No vehicles in this showroom</h3>
                <p>Add a new vehicle to this showroom.</p>
                <a href="/cars/add" class="btn edit-btn" style="text-decoration: none; margin-top: 10px; display: inline-block; padding: 10px 20px;">
                    <i class="fas fa-plus"></i> Add Vehicle
                </a>
            </div>
        </section>
    </main>
</div>

<script src="/js/cars.js"></script>
</body>
</html>
