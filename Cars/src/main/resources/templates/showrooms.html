<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Inventory</title>
    <link rel="stylesheet" href="/css/dashboard.css">

</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="logo"> <img th:src="@{/images/logo.png}" alt="DK3 Cars Logo"></div>
        <ul>
            <li onclick="location.href='/dashboard'">
                Dashboard
            </li>

            <li class="active" onclick="location.href='/showrooms'">
                Showrooms
            </li>

            <li onclick="location.href='/sales'">
                Sales
            </li>

            <li onclick="location.href='/customers'">
                Customers
            </li>

            <li onclick="location.href='/reports'">
                Reports
            </li>

            <li onclick="location.href='/settings'">
                Settings
            </li>
        </ul>

    </aside>
    <main class="main">

        <h2>Showroom Inventory</h2>

        <!-- ADD SHOWROOM FORM -->
        <!-- ================= ADD SHOWROOM SECTION ================= -->
        <section class="panel add-showroom-panel">
            <h3>Add New Showroom</h3>

            <div class="add-showroom-form">

                <div class="form-group">
                    <label>Showroom Name</label>
                    <input type="text" id="srName" placeholder="Enter showroom name">
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="srCity" placeholder="Enter city">
                </div>

                <div class="form-group">
                    <label>Showroom Type</label>
                    <select id="srType">
                        <option value="Normal">Normal</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Showroom Image</label>
                    <input type="file" id="srImage" accept="image/*" onchange="previewImage(event)">
                </div>

                <!-- IMAGE PREVIEW -->

                <button class="btn-primary" onclick="saveShowroom()">
                    + Add Showroom
                </button>

            </div>
        </section>

        <!-- SHOWROOM LIST -->
        <!-- ================= SHOWROOM SECTION ================= -->
        <section class="panel">
            <h3>Showrooms</h3>

            <div class="showroom-toolbar">
                <input type="text" placeholder="Search showroom..."
                       onkeyup="filterShowrooms(this.value)">
            </div>

            <div id="showroomGrid" class="showroom-grid"></div>
        </section>

    </main>

</div>

<script src="/js/showrooms.js"></script>
</body>
</html>
