<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <link rel="stylesheet" href="/css/typography.css">
    <title>Inventory</title>
    <link rel="stylesheet" href="/css/showrooms.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/profile.css">
    <style>
        :root {
            --primary: #6c4ef6;
            --accent: #9f7bff;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 18px 45px rgba(0, 0, 0, .15);
            --bg: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(108, 78, 246, .1), rgba(159, 123, 255, .1));
        }

        /* ================= NAVBAR ================= */
        .navbar {
            max-width: 1500px;
            margin: 25px auto;
            padding: 14px 28px;
            background: var(--glass);
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 20px;
            z-index: 999;
        }
 .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            transition: .3s;
        }

        .logo img:hover {
            transform: rotate(10deg) scale(1.08);
        }
         .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: #000;
        }

        .logo-text span {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }
        .nav-links a {
            margin: 0 16px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            height: 2px;
            width: 0;
            background: var(--primary);
            transition: .3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: 18px;
        }

        .nav-icons i {
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: .3s;
        }

        .nav-icons i:hover {
            background: #f3f4ff;
            color: var(--primary);
            transform: scale(1.15);
        }

        /* ================= LAYOUT ================= */
        .container {
            max-width: 1400px;
            margin: auto;
            display: flex;
            gap: 24px;
            padding-bottom: 40px;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #fff, #f3f1ff);
            border-radius: 28px;
            padding: 24px 16px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .sidebar ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar li {
            padding: 14px 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar li i {
            font-size: 18px;
            color: var(--primary);
        }

        .sidebar li:hover {
            background: rgba(108, 78, 246, .1);
            transform: translateX(6px);
        }

        .sidebar li.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
        }

        .sidebar li.active i {
            color: #fff;
        }

        /* ================= MAIN ================= */
        .main {
            flex: 1;
            background: var(--bg);
            border-radius: 28px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        h2 {
            font-size: 20px;
            margin: 12px 0 18px
        }

        /* Panels */
        .panel {
            background: var(--card);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: var(--shadow)
        }

        .panel h3 {
            margin: 0 0 12px;
            font-size: 16px
        }

        /* Add showroom form */
        .add-showroom-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            align-items: end
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .form-group label {
            font-size: 13px;
            color: var(--muted)
        }

        .form-group input[type='text'],
        .form-group select,
        .form-group input[type='file'] {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e6e9f2;
            background: #fbfbff
        }

        /* file preview */
        .preview-wrapper {
            display: flex;
            align-items: center
        }

        .preview-img {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #eaeefb;
            margin-left: 8px
        }

        /* Primary button */
        .btn-primary {
            grid-column: 1/-1;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s ease, opacity .15s ease
        }

        .btn-primary:active {
            transform: translateY(1px)
        }

        .btn-primary[disabled] {
            opacity: .6;
            cursor: not-allowed
        }

        /* small link-style button for page navigation */
        .btn-link {
            background: transparent;
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(108, 78, 246, 0.08);
            text-decoration: none;
            font-weight: 600
        }

        .btn-link:hover {
            background: rgba(108, 78, 246, 0.06)
        }

        /* Toolbar (search) */
        .showroom-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap
        }

        .showroom-toolbar input {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e6e9f2;
            background: #fff
        }

        .showroom-search-note {
            width: 100%;
            font-size: 12px;
            color: #64748b;
        }

        /* Grid & Cards */
        .showroom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px
        }

        .showroom-card {
            background: linear-gradient(180deg, #fff, #fbfbff);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease
        }

        .showroom-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 48px rgba(16, 24, 40, 0.12)
        }

        .image-box {
            position: relative;
            height: 150px;
            overflow: hidden
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block
        }

        .image-box .badge {
            position: absolute;
            left: 12px;
            top: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: #fff
        }

        .badge-normal {
            background: #22c55e
        }

        .badge-premium {
            background: #f59e0b
        }

        .info {
            padding: 12px
        }

        .info h4 {
            margin: 0;
            font-size: 15px
        }

        .info p {
            margin: 6px 0;
            color: var(--muted);
            font-size: 13px
        }

        .info small {
            color: var(--primary);
            display: inline-block;
            margin-top: 6px
        }

        .showroom-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .showroom-action-btn {
            border: none;
            border-radius: 10px;
            padding: 9px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .showroom-action-btn.view {
            background: #e0f2fe;
            color: #075985;
        }

        .showroom-action-btn.call {
            background: #dcfce7;
            color: #166534;
            text-decoration: none;
        }

        .showroom-action-btn.edit {
            background: #ede9fe;
            color: #5b21b6;
        }

        .showroom-action-btn.delete {
            background: #fee2e2;
            color: #b91c1c;
        }

        .showroom-action-note {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
        }

        /* Small screens */
        @media (max-width:900px) {
            .add-showroom-form {
                grid-template-columns: 1fr
            }

            .sidebar {
                display: none
            }

            .container {
                padding: 10px
            }
        }

        /* Accessibility focus */
        a:focus,
        button:focus,
        input:focus {
            outline: 3px solid rgba(108, 78, 246, 0.12);
            outline-offset: 2px
        }
    </style>
</head>
