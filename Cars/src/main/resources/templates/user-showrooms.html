<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showrooms</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: #f7fafc; }
        .wrap { max-width: 1100px; margin: 22px auto; padding: 0 14px; }
        .top { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 8px 18px rgba(0,0,0,.08); display: flex; justify-content: space-between; }
        .grid { margin-top: 14px; display: grid; gap: 12px; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); }
        .card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 8px 18px rgba(0,0,0,.08); }
        .title { margin: 0 0 5px; font-size: 18px; }
        .muted { color: #5f6f87; font-size: 13px; margin: 4px 0; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <h2>View Showrooms</h2>
        <a href="/user-dashboard">Back to Dashboard</a>
    </div>
    <div class="grid" id="showroomsGrid"></div>
</div>
<script>
    async function loadShowrooms() {
        const res = await fetch("/user-panel/api/showrooms");
        const data = await res.json();
        const grid = document.getElementById("showroomsGrid");
        if (!data.ok || !data.showrooms.length) {
            grid.innerHTML = "<div>No showrooms found.</div>";
            return;
        }
        grid.innerHTML = data.showrooms.map(s => `
            <div class="card">
                <h3 class="title">${s.name || "-"}</h3>
                <div class="muted"><strong>Address:</strong> ${s.address || "-"}</div>
                <div class="muted"><strong>Contact:</strong> ${s.contactNumber || "-"}</div>
                <div class="muted"><strong>Available Cars:</strong> ${s.availableCarsCount ?? 0}</div>
                <div class="muted"><strong>Working Hours:</strong> ${s.workingHours || "-"}</div>
                <div class="muted"><strong>City:</strong> ${s.city || "-"}</div>
                ${s.mapUrl ? `<a target="_blank" href="${s.mapUrl}">Open Location Map</a>` : ""}
            </div>
        `).join("");
    }
    loadShowrooms();
</script>
</body>
</html>
