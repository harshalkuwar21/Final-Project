<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/typography.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Showrooms</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: var(--font-body);
}

body{
background:linear-gradient(135deg,#eef3ff,#f8f7ff);
color:#1a2b4b;
min-height:100vh;
}

.wrap{
max-width:1240px;
margin:auto;
padding:24px;
}

.top{
background:#fff;
padding:18px 20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.top h2{
font-size:30px;
}

.top p{
margin-top:4px;
font-size:14px;
color:#68758d;
}

.top a{
text-decoration:none;
background:#eef4ff;
color:#005bbb;
padding:10px 14px;
border-radius:10px;
font-size:14px;
font-weight:600;
}

.toolbar{
margin-top:20px;
background:#fff;
padding:16px 18px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

.toolbar input{
flex:1;
min-width:240px;
padding:12px 14px;
border-radius:12px;
border:1px solid #dbe4f4;
font-size:14px;
}

.toolbar .count{
font-size:13px;
color:#68758d;
font-weight:600;
}

.grid{
margin-top:22px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:18px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 14px 30px rgba(0,0,0,0.08);
border:1px solid #e5e7f2;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
background:#eef3ff;
}

.content{
padding:18px;
}

.content h3{
font-size:24px;
margin-bottom:10px;
}

.detail{
font-size:14px;
color:#5e6d86;
line-height:1.7;
margin-bottom:8px;
}

.actions{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
padding:10px 15px;
border-radius:10px;
font-weight:600;
font-size:14px;
}

.call-btn{
background:#eef5ff;
color:#005bbb;
border:1px solid #c9dcff;
}

.map-btn{
background:linear-gradient(135deg,#005bbb,#0077ff);
color:#fff;
}

.empty{
margin-top:22px;
background:#fff;
padding:30px 20px;
border-radius:18px;
text-align:center;
color:#67758d;
box-shadow:0 12px 26px rgba(0,0,0,0.06);
}
</style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <div>
            <h2>Contact Showrooms</h2>
            <p>Search showroom name and contact the right branch quickly.</p>
        </div>
        <a href="/user-dashboard">Back to Dashboard</a>
    </div>

    <div class="toolbar">
        <input type="text" id="showroomSearchInput" placeholder="Search showroom name, city, address..." oninput="filterShowrooms(this.value)">
        <div class="count" id="showroomCount">0 showrooms</div>
    </div>

    <div id="showroomGrid" class="grid"></div>
    <div id="emptyState" class="empty" style="display:none;">No showroom details available.</div>
</div>

<script>
let showroomCache = [];

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#39;");
}

function showroomImage(showroom){
return showroom.imageUrl || showroom.image || "/images/background.jpg";
}

function showroomType(showroom){
return showroom.type || "Normal";
}

function phoneLink(number){
const cleaned = String(number || "").replace(/[^\d+]/g, "");
return cleaned ? `tel:${cleaned}` : "#";
}

function updateShowroomCount(count){
const countBox = document.getElementById("showroomCount");
if(countBox){
countBox.textContent = `${count} showroom${count === 1 ? "" : "s"}`;
}
}

function renderShowrooms(showrooms){
const grid = document.getElementById("showroomGrid");
const empty = document.getElementById("emptyState");

if(!showrooms.length){
grid.innerHTML = "";
empty.style.display = "block";
updateShowroomCount(0);
return;
}

empty.style.display = "none";
updateShowroomCount(showrooms.length);
grid.innerHTML = showrooms.map(showroom => `
<div class="card">
    <img src="${escapeHtml(showroomImage(showroom))}" alt="${escapeHtml(showroom.name || 'Showroom')}">
    <div class="content">
        <h3>${escapeHtml(showroom.name || "-")}</h3>
        <div class="detail"><strong>Type:</strong> ${escapeHtml(showroomType(showroom))}</div>
        <div class="detail"><strong>City:</strong> ${escapeHtml(showroom.city || "-")}</div>
        <div class="detail"><strong>Address:</strong> ${escapeHtml(showroom.address || "-")}</div>
        <div class="detail"><strong>Working Hours:</strong> ${escapeHtml(showroom.workingHours || "-")}</div>
        <div class="detail"><strong>Contact:</strong> ${escapeHtml(showroom.contactNumber || "-")}</div>
        <div class="detail"><strong>Available Cars:</strong> ${escapeHtml(showroom.availableCarsCount ?? 0)}</div>
        <div class="actions">
            <a class="btn call-btn" href="${phoneLink(showroom.contactNumber)}">Call Now</a>
            ${showroom.mapUrl ? `<a class="btn map-btn" href="${escapeHtml(showroom.mapUrl)}" target="_blank" rel="noopener noreferrer">View Map</a>` : ""}
        </div>
    </div>
</div>
`).join("");
}

function filterShowrooms(keyword){
const query = String(keyword || "").trim().toLowerCase();
if(!query){
renderShowrooms(showroomCache);
return;
}

const filtered = showroomCache.filter(showroom =>
String(showroom.name || "").toLowerCase().includes(query) ||
String(showroom.city || "").toLowerCase().includes(query) ||
String(showroom.address || "").toLowerCase().includes(query) ||
String(showroom.contactNumber || "").toLowerCase().includes(query)
);
renderShowrooms(filtered);
}

async function loadShowrooms(){
const res = await fetch("/user-panel/api/showrooms");
const data = await res.json();
showroomCache = data && data.ok && Array.isArray(data.showrooms) ? data.showrooms : [];
renderShowrooms(showroomCache);
}

loadShowrooms().catch(() => {
document.getElementById("showroomGrid").innerHTML = "";
document.getElementById("emptyState").style.display = "block";
updateShowroomCount(0);
});
</script>
</body>
</html>
