<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Add Vehicle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --primary: #6c4ef6;
            --accent: #9f7bff;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 18px 45px rgba(0, 0, 0, .15);
            --bg: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(108, 78, 246, .1), rgba(159, 123, 255, .1));
        }

        .navbar {
            max-width: 1500px;
            margin: 25px auto;
            padding: 14px 28px;
            background: var(--glass);
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 20px;
            z-index: 999;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            transition: .3s;
        }

        .logo img:hover {
            transform: rotate(10deg) scale(1.08);
        }

        .nav-icons {
            display: flex;
            gap: 18px;
        }

        .nav-icons i {
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: .3s;
        }

        .nav-icons i:hover {
            background: #f3f4ff;
            color: var(--primary);
            transform: scale(1.15);
        }

        .container {
            max-width: 1400px;
            margin: auto;
            display: flex;
            gap: 24px;
            padding-bottom: 40px;
        }

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #fff, #f3f1ff);
            border-radius: 28px;
            padding: 24px 16px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .sidebar ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar li {
            padding: 14px 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar li i {
            font-size: 18px;
            color: var(--primary);
        }

        .sidebar li:hover {
            background: rgba(108, 78, 246, .1);
            transform: translateX(6px);
        }

        .sidebar li.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
        }

        .sidebar li.active i {
            color: #fff;
        }

        .main {
            flex: 1;
            background: var(--bg);
            border-radius: 28px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        h2 {
            font-size: 20px;
            margin: 12px 0 18px;
        }

        .panel {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
        }

        .add-car-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            color: #6b7280;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e6e9f2;
            background: #fbfbff;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        .btn-primary {
            grid-column: 1 / -1;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s ease, opacity .15s ease;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-primary[disabled] {
            opacity: .6;
            cursor: not-allowed;
        }

        @media (max-width: 900px) {
            .add-car-form { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
<header class="navbar">
    <div class="logo">
        <img src="/images/logo.png" alt="logo">
        DK3 Cars
    </div>
    <div class="nav-icons">
        <i class="fa fa-bell"></i>
        <i class="fa fa-user-circle"></i>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
            <li onclick="location.href='/showrooms'"><i class="fas fa-car"></i> Showroom</li>
            <li class="active"><i class="fas fa-plus"></i> Add Vehicle</li>
            <li onclick="location.href='/cars/all'"><i class="fas fa-car-side"></i> All Vehicles</li>
        </ul>
    </aside>

    <main class="main">
        <section class="panel">
            <h3>Add New Vehicle</h3>
            <form id="carAddForm" class="add-car-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Brand</label>
                    <input name="brand" type="text" required>
                </div>
                <div class="form-group">
                    <label>Model</label>
                    <input name="model" type="text" required>
                </div>
                <div class="form-group">
                    <label>Variant</label>
                    <input name="variant" type="text">
                </div>
                <div class="form-group">
                    <label>Fuel Type</label>
                    <select name="fuelType">
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="EV">EV</option>
                        <option value="CNG">CNG</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Transmission</label>
                    <select name="transmission">
                        <option value="Manual">Manual</option>
                        <option value="Automatic">Automatic</option>
                        <option value="CVT">CVT</option>
                        <option value="IVT">IVT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <input name="color" type="text">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input name="price" type="number" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="Available">Available</option>
                        <option value="Sold">Sold</option>
                        <option value="Reserved">Reserved</option>
                        <option value="Under Maintenance">Under Maintenance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>VIN</label>
                    <input name="vin" type="text">
                </div>
                <div class="form-group">
                    <label>Engine No</label>
                    <input name="engineNo" type="text">
                </div>
                <div class="form-group">
                    <label>Purchase Date</label>
                    <input name="purchaseDate" type="date">
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input name="stockQuantity" type="number" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Showroom</label>
                    <select name="showroom" required>
                        <option value="">Select showroom</option>
                        <option th:each="sr : ${showrooms}" th:value="${sr.id}" th:text="${sr.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Supplier Info</label>
                    <input name="supplierInfo" type="text">
                </div>
                <div class="form-group form-group-full">
                    <label>Images</label>
                    <input name="images" type="file" multiple>
                </div>
                <button id="carAddBtn" class="btn-primary" type="submit">+ Add Vehicle</button>
                <div id="carAddStatus" class="form-group-full" style="color:#666"></div>
            </form>
        </section>
    </main>
</div>

<script src="/js/car-add.js"></script>
</body>
</html>
