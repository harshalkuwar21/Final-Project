<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DK3 Cars | Admin Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="layout">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
        <div class="logo"> <img th:src="@{/images/logo.png}" alt="DK3 Cars Logo"></div>
        <ul>
            <li class="active" onclick="location.href='/dashboard'">
                Dashboard
            </li>

            <li onclick="location.href='/showrooms'">
                Showrooms
            </li>

            <li onclick="location.href='/sales'">
                Sales
            </li>

            <li onclick="location.href='/customers'">
                Customers
            </li>

            <li onclick="location.href='/reports'">
                Reports
            </li>

            <li onclick="location.href='/settings'">
                Settings
            </li>
        </ul>

    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main">

        <!-- ================= HEADER ================= -->
        <header class="topbar">
            <h2>Car Showroom Management</h2>
            <div class="icons">🔍 🔔</div>
        </header>

        <!-- ================= KPI CARDS ================= -->
        <div class="cards">

            <div class="card">
                <span>Total Showroom</span>
                <h3 id="totalCars">0</h3>
            </div>

            <div class="card">
                <span>Cars Sold</span>
                <h3 id="soldCars">0</h3>
            </div>

            <div class="card">
                <span>Available Cars</span>
                <h3 id="availableCars">0</h3>
            </div>

            <div class="card">
                <span>Total Revenue</span>
                <h3 id="revenue">₹ 0</h3>
            </div>

        </div>

        <!-- ================= GRID ================= -->
        <div class="grid">

            <!-- ================= SOLD CARS TABLE ================= -->
            <section class="panel wide">
                <h3>Sold Cars</h3>

                <table>
                    <thead>
                    <tr>
                        <th>Car Model</th>
                        <th>Buyer Name</th>
                        <th>Sold Date</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody id="salesTable">
                    <!-- Dynamic Rows Here -->
                    </tbody>
                </table>
            </section>

            <!-- ================= CAR DETAILS ================= -->


            <!-- ================= INVENTORY CHARTS ================= -->
            <!-- ================= INVENTORY CHARTS ================= -->
            <section class="panel wide">
                <h3>Inventory Overview</h3>

                <div class="charts">
                    <div class="chart">
                        <h4>Cars By Brand</h4>
                        <div class="bars" id="inventoryBars"></div>
                        <p id="inventoryLabels"></p>
                    </div>
                </div>
            </section>


            <!-- ================= TOP SELLING ================= -->
            <!-- ================= TOP SELLING ================= -->
            <section class="panel">
                <h3>Top Selling Cars</h3>
                <ol id="topCars" class="top-list"></ol>
            </section>


        </div>

    </main>

</div>

<!-- ================= DASHBOARD SCRIPT ================= -->
<script src="/js/dashboard.js"></script>

</body>
</html>
