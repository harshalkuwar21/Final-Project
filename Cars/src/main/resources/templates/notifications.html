<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" href="/css/typography.css">
    <meta charset="UTF-8">
    <title>Notifications - DK3 Cars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/notifications.css">
</head>

<body>
<header class="navbar">
        <div class="logo"><img src="/images/logo.png" alt="logo"> DK3 Cars</div>
    </header>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <ul class="menu">
                <li class="dashboard" onclick="location.href='/dashboard'">
                    <i class="fa fa-home"></i>
                    <span>Dashboard</span>
                </li>

                <li class="showroom" onclick="location.href='/showrooms'">
                    <i class="fas fa-store"></i>
                    <span>Showroom</span>
                </li>

                <li class="vehicles" onclick="location.href='/cars/all'">
                    <i class="fas fa-car-side"></i>
                    <span>All Vehicles</span>
                </li>

                <li class="bookings" onclick="location.href='/bookings'">
                    <i class="fas fa-calendar-check"></i>
                    <span>Bookings</span>
                </li>

                <li class="sales" onclick="location.href='/sales'">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Sales</span>
                </li>

                <li class="customers" onclick="location.href='/customers'">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </li>

                <li class="staff" onclick="location.href='/staff'">
                    <i class="fas fa-user-tie"></i>
                    <span>Staff</span>
                </li>

                <li class="finance" onclick="location.href='/finance'">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Finance</span>
                </li>

                <li class="documents" onclick="location.href='/documents'">
                    <i class="fas fa-file-alt"></i>
                    <span>Documents</span>
                </li>

                <li class="reports" onclick="location.href='/reports'">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </li>

                <li class="active" onclick="location.href='/notifications'"><i class="fas fa-bell"></i> Notifications
                </li>


                <li class="logout" id="logoutBtn">
                    <i class="fas fa-right-from-bracket"></i>
                    <span>Logout</span>
                </li>

            </ul>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1><i class="fas fa-bell"></i> Notifications</h1>
                <div>
                    <button class="btn btn-secondary" onclick="markAllRead()">Mark All Read</button>
                    <button class="btn" onclick="openCreateModal()"><i class="fas fa-plus"></i> Create</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-bell" style="color:#7f5af0;"></i>
                    <h3 id="totalNotifications">0</h3>
                    <p>Total</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-envelope-open-text" style="color:#2dd36f;"></i>
                    <h3 id="unreadNotifications">0</h3>
                    <p>Unread</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-info-circle" style="color:#ff9f43;"></i>
                    <h3 id="recent24">0</h3>
                    <p>Last 24h</p>
                </div>
            </div>

            <div class="card">
                <div class="filter-section">
                    <input type="text" id="searchInput" placeholder="Search notifications...">
                    <select id="filterType">
                        <option value="">All Types</option>
                        <option value="INFO">Info</option>
                        <option value="WARNING">Warning</option>
                        <option value="ALERT">Alert</option>
                        <option value="ERROR">Error</option>
                    </select>
                    <button class="btn btn-secondary" onclick="applyFilters()">Filter</button>
                    <button class="btn btn-secondary" onclick="clearFilters()">Reset</button>
                </div>

                <ul id="notificationsList" class="notifications-list">
                    <li class="empty">Loading notifications...</li>
                </ul>
            </div>
        </main>
    </div>

    <!-- Create Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="closeCreateModal()">&times;</button>
            <h2>Create Notification</h2>
            <div class="form-group">
                <label>Title</label>
                <input id="nTitle" />
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="nMessage"></textarea>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="nType">
                    <option value="INFO">Info</option>
                    <option value="WARNING">Warning</option>
                    <option value="ALERT">Alert</option>
                    <option value="ERROR">Error</option>
                </select>
            </div>
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn" onclick="createNotification()">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/notifications.js"></script>
</body>

</html>
