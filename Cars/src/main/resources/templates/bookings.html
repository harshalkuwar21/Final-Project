<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="/css/typography.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings Management - DK3 Cars</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
     :root{
--primary:#6366f1;
--secondary:#8b5cf6;
--accent:#a78bfa;
--success:#22c55e;
--warning:#f59e0b;
--danger:#ef4444;
--dark:#1e293b;
--light:#f8fafc;

--border-radius:12px;
--shadow:0 15px 40px rgba(0,0,0,0.12);
--transition:0.3s ease;
--glass:rgba(255,255,255,0.9);
--bg:#eef2ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: var(--font-body);
}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc,#e0e7ff);
min-height:100vh;
padding:25px;
}

/* NAVBAR */

.navbar{
max-width:1500px;
margin:auto;
padding:16px 30px;
background:var(--glass);
backdrop-filter:blur(10px);
border-radius:18px;
box-shadow:var(--shadow);
display:flex;
justify-content:space-between;
align-items:center;
}
 .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            transition: .3s;
        }

        .logo img:hover {
            transform: rotate(10deg) scale(1.08);
        }
         .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: #000;
        }

        .logo-text span {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }
.nav-icons i{
font-size:20px;
padding:10px;
border-radius:50%;
cursor:pointer;
transition:var(--transition);
}

.nav-icons i:hover{
background:#eef2ff;
color:var(--primary);
transform:scale(1.15);
}

/* CONTAINER */

.container{
max-width:1500px;
margin:25px auto;
display:flex;
gap:24px;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:linear-gradient(180deg,#ffffff,#f5f3ff);
border-radius:20px;
padding:24px;
box-shadow:var(--shadow);
}

.sidebar ul{
list-style:none;
display:flex;
flex-direction:column;
gap:14px;
}

.sidebar li{
padding:14px 18px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
font-weight:500;
transition:var(--transition);
}

.sidebar li i{
color:var(--primary);
}

.sidebar li:hover{
background:#eef2ff;
transform:translateX(6px);
}

.sidebar li.active{
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
}

.sidebar li.active i{
color:white;
}

/* MAIN */

.main{
flex:1;
background:white;
border-radius:20px;
box-shadow:var(--shadow);
overflow:hidden;
}

/* HEADER */

.header{
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
padding:22px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
font-size:24px;
font-weight:600;
}

/* BUTTONS */

.btn{
padding:10px 18px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:500;
display:inline-flex;
align-items:center;
gap:8px;
cursor:pointer;
transition:var(--transition);
}

.btn-primary{
background:white;
color:var(--primary);
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.btn-danger{
background:var(--danger);
color:white;
}

/* FILTERS */

.filters{
padding:20px 30px;
background:#f8fafc;
border-bottom:1px solid #e2e8f0;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.filter-group{
display:flex;
align-items:center;
gap:8px;
}

.filter-group label{
font-weight:500;
color:#334155;
}

.filter-group input,
.filter-group select{
padding:8px 12px;
border-radius:8px;
border:1px solid #d1d5db;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

thead{
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
}

thead th{
padding:14px;
font-weight:600;
}

tbody tr{
border-bottom:1px solid #e5e7eb;
transition:var(--transition);
}

tbody tr:hover{
background:#f1f5ff;
transform:scale(1.002);
}

tbody td{
padding:12px;
}

/* STATUS BADGES */

.status-badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.status-pending{
background:#fef3c7;
color:#92400e;
}

.status-confirmed{
background:#dbeafe;
color:#1e3a8a;
}

.status-approved{
background:#dcfce7;
color:#166534;
}

.status-rejected{
background:#fee2e2;
color:#991b1b;
}

.status-delivered{
background:#bbf7d0;
color:#166534;
}

/* ACTION BUTTONS */

.actions{
display:flex;
gap:6px;
}

.action-btn{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
transition:var(--transition);
}

.edit-btn{
background:#6366f1;
color:white;
}

.edit-btn:hover{
background:#4f46e5;
}

.delete-btn{
background:#ef4444;
color:white;
}

/* MODAL */

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
animation:fadeIn .3s;
}

.modal-content{
background:white;
margin:6% auto;
max-width:600px;
border-radius:14px;
box-shadow:var(--shadow);
animation:slideIn .3s;
}

.modal-header{
padding:18px 25px;
border-bottom:1px solid #e5e7eb;
display:flex;
justify-content:space-between;
}

.modal-body{
padding:20px 25px;
}

.modal-footer{
padding:20px 25px;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:flex-end;
gap:10px;
}

.form-group{
margin-bottom:16px;
}

.form-group label{
display:block;
margin-bottom:4px;
font-weight:500;
}

.form-group input,
.form-group select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 2px rgba(99,102,241,.2);
}

/* ANIMATION */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideIn{
from{
transform:translateY(-40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}
    </style>
</head>
<body>
<header class="navbar">
  <div class="logo">
        <img src="/images/logo.png" alt="DK3 Cars Logo">
        <div class="logo-text">DK3 CARS<span>Premium Showroom</span></div>  
    </div>
</header>

<div class="container">

    <!-- SIDEBAR -->
     <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fa fa-home"></i> Return to Dashboard</li>
        </ul>
    </aside>
    <main class="main">

        <div class="header">
            <h1><i class="fas fa-calendar-check"></i> Bookings Management</h1>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="fas fa-plus"></i> Add New Booking
            </button>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter" onchange="filterBookings()">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Payment Verified">Payment Verified</option>
                    <option value="Waiting">Waiting</option>
                    <option value="Approved">Approved</option>
                    <option value="Confirmed">Confirmed</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Cancelled">Cancelled</option>
                    <option value="Delivered">Delivered</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchInput">Search:</label>
                <input type="text" id="searchInput" placeholder="Search by customer or car..." onkeyup="filterBookings()">
            </div>
        </div>

        <div class="table-container">
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Car</th>
                        <th>Sales Executive</th>
                        <th>Status</th>
                        <th>Booking Amount</th>
                        <th>Payment Mode</th>
                        <th>Expected Delivery</th>
                        <th>Booking Date</th>
                        <th>Documents</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <!-- Bookings will be loaded here -->
                </tbody>
            </table>
        </div>

        <!-- Add/Edit Booking Modal -->
        <div id="bookingModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Add New Booking</h2>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <form id="bookingForm">
                    <input type="hidden" id="bookingId" name="id">

                    <div class="form-group">
                        <label for="customerId">Customer:</label>
                        <select id="customerId" name="customerId" required>
                            <option value="">Select Customer</option>
                            <option th:each="customer : ${customers}"
                                    th:value="${customer.id}"
                                    th:text="${customer.name}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="carId">Car:</label>
                        <select id="carId" name="carId" required>
                            <option value="">Select Car</option>
                            <option th:each="car : ${cars}"
                                    th:value="${car.id}"
                                    th:text="${car.brand + ' ' + car.model}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="salesExecutiveId">Sales Executive:</label>
                        <select id="salesExecutiveId" name="salesExecutiveId" required>
                            <option value="">Select Sales Executive</option>
                            <option th:each="executive : ${salesExecutives}"
                                    th:value="${executive.userid}"
                                    th:text="${executive.first + ' ' + executive.last}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status" name="status" required>
                            <option value="Pending">Pending</option>
                            <option value="Waiting">Waiting</option>
                            <option value="Confirmed">Confirmed</option>
                            <option value="Rejected">Rejected</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="bookingAmount">Booking Amount:</label>
                        <input type="number" id="bookingAmount" name="bookingAmount" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="paymentMode">Payment Mode:</label>
                        <select id="paymentMode" name="paymentMode" required>
                            <option value="Cash">Cash</option>
                            <option value="Credit Card">Credit Card</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="Cheque">Cheque</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="expectedDeliveryDate">Expected Delivery Date:</label>
                        <input type="date" id="expectedDeliveryDate" name="expectedDeliveryDate">
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Booking</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="deleteModal" class="modal">
            <div class="modal-content small">
                <div class="modal-header">
                    <h2>Confirm Delete</h2>
                    <span class="close" onclick="closeDeleteModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this booking?</p>
                    <p id="deleteBookingInfo"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                </div>
            </div>
        </div>
        </main>
    </div>

    <script src="/js/bookings.js"></script>
</body>
</html>
