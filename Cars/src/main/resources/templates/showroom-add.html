<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Add Showroom</title>
    <link rel="stylesheet" href="/css/showrooms.css">
</head>
<body>
<header class="navbar">
    <div class="logo">
        <img src="/images/logo.png" alt="logo">
        DK3 Cars
    </div>
    <div class="nav-icons">
            <i class="fa fa-bell"></i>
            <i class="fa fa-user-circle"></i>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'">Dashboard</li>
            <li onclick="location.href='/showrooms'">Showrooms</li>
            <li class="active">Add Showroom</li>
        </ul>
    </aside>

    <main class="main">
        <section class="panel add-showroom-panel">
            <h3>Add New Showroom</h3>

            <div class="add-showroom-form">
                <div class="form-group">
                    <label>Showroom Name</label>
                    <input type="text" id="srName" placeholder="Enter showroom name">
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="srCity" placeholder="Enter city">
                </div>

                <div class="form-group">
                    <label>Showroom Type</label>
                    <select id="srType">
                        <option value="Normal">Normal</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Showroom Image</label>
                    <input type="file" id="srImage" accept="image/*" onchange="previewImage(event)">
                    <div class="preview-wrapper"><img id="previewImg" class="preview-img" alt="Preview" style="display:none"></div>
                </div>

                <button id="srAddBtn" class="btn-primary" onclick="saveShowroom()">+ Add Showroom</button>
                <div id="srStatus" style="margin-top:8px;color:#666"></div>
            </div>
        </section>
    </main>
</div>

<script src="/js/showroom-add.js"></script>
</body>
</html>
