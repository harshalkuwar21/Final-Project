<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <link rel="stylesheet" href="/css/typography.css">
    <meta charset="utf-8">
    <title>Add Showroom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
       :root {
    --primary: #6c4ef6;
    --accent: #9f7bff;
    --glass: rgba(255, 255, 255, 0.9);
    --shadow: 0 20px 45px rgba(0,0,0,0.08);
    --bg: #f4f6ff;
    --card: #ffffff;
    --muted: #6b7280;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: var(--font-body);
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#eef2ff,#f7f4ff);
}


/* ================= NAVBAR ================= */

.navbar{
    max-width:1500px;
    margin:25px auto;
    padding:16px 30px;
    background:var(--glass);
    backdrop-filter:blur(10px);
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:var(--shadow);
    position:sticky;
    top:20px;
    z-index:999;
}

 .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            transition: .3s;
        }

        .logo img:hover {
            transform: rotate(10deg) scale(1.08);
        }
         .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: #000;
        }

        .logo-text span {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }
/* nav links */

.nav-links a{
    margin:0 18px;
    text-decoration:none;
    color:#333;
    font-weight:500;
    position:relative;
}

.nav-links a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-6px;
    height:2px;
    width:0;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    transition:.3s;
}

.nav-links a:hover::after{
    width:100%;
}

/* nav icons */

.nav-icons{
    display:flex;
    gap:16px;
}

.nav-icons i{
    font-size:19px;
    padding:9px;
    border-radius:50%;
    cursor:pointer;
    transition:.3s;
}

.nav-icons i:hover{
    background:#eef1ff;
    color:var(--primary);
    transform:scale(1.1);
}


/* ================= LAYOUT ================= */

.container{
    max-width:1400px;
    margin:auto;
    display:flex;
    gap:28px;
    padding-bottom:40px;
}


/* ================= SIDEBAR ================= */

.sidebar{
    width:250px;
    background:linear-gradient(180deg,#ffffff,#f5f3ff);
    border-radius:24px;
    padding:24px 18px;
    box-shadow:var(--shadow);
}

.sidebar ul{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.sidebar li{
    padding:14px 18px;
    border-radius:16px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    transition:.25s;
    font-weight:500;
    color:#444;
}

.sidebar li i{
    font-size:18px;
    color:var(--primary);
}

.sidebar li:hover{
    background:rgba(108,78,246,0.08);
    transform:translateX(6px);
}

.sidebar li.active{
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff;
}

.sidebar li.active i{
    color:#fff;
}


/* ================= MAIN ================= */

.main{
    flex:1;
    background:var(--bg);
    border-radius:26px;
    padding:32px;
    box-shadow:var(--shadow);
}

h2{
    font-size:22px;
    margin-bottom:22px;
}


/* ================= PANELS ================= */

.panel{
    background:var(--card);
    border-radius:16px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.panel h3{
    margin-bottom:14px;
    font-size:17px;
}


/* ================= FORM ================= */

.add-showroom-form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    align-items:end;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.form-group label{
    font-size:13px;
    color:var(--muted);
}

.form-group input,
.form-group select,
.form-group input[type="file"]{
    padding:11px 14px;
    border-radius:10px;
    border:1px solid #e6e9f2;
    background:#fafaff;
    transition:.2s;
}

.form-group input:focus,
.form-group select:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 2px rgba(108,78,246,0.08);
}


/* file preview */

.preview-wrapper{
    display:flex;
    align-items:center;
}

.preview-img{
    width:120px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #eaeefb;
    margin-left:10px;
}


/* ================= BUTTON ================= */

.btn-primary{
    grid-column:1/-1;
    padding:13px 18px;
    border-radius:12px;
    border:none;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(108,78,246,0.25);
}

.btn-primary:active{
    transform:scale(.98);
}

.btn-primary[disabled]{
    opacity:.6;
    cursor:not-allowed;
}


/* ================= LINK BUTTON ================= */

.btn-link{
    background:transparent;
    color:var(--primary);
    padding:8px 14px;
    border-radius:8px;
    border:1px solid rgba(108,78,246,0.1);
    text-decoration:none;
    font-weight:600;
}

.btn-link:hover{
    background:rgba(108,78,246,0.07);
}


/* ================= TOOLBAR ================= */

.showroom-toolbar{
    display:flex;
    gap:14px;
    margin-bottom:18px;
}

.showroom-toolbar input{
    flex:1;
    padding:11px 14px;
    border-radius:12px;
    border:1px solid #e6e9f2;
    background:#fff;
}


/* ================= SHOWROOM GRID ================= */

.showroom-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:20px;
}

.showroom-card{
    background:linear-gradient(180deg,#fff,#fafaff);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(16,24,40,0.06);
    cursor:pointer;
    transition:.25s;
}

.showroom-card:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 45px rgba(16,24,40,0.15);
}


/* ================= IMAGE ================= */

.image-box{
    position:relative;
    height:150px;
    overflow:hidden;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.image-box .badge{
    position:absolute;
    left:12px;
    top:12px;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    color:#fff;
}

.badge-normal{
    background:#22c55e;
}

.badge-premium{
    background:#f59e0b;
}


/* ================= INFO ================= */

.info{
    padding:14px;
}

.info h4{
    margin:0;
    font-size:16px;
}

.info p{
    margin:6px 0;
    color:var(--muted);
    font-size:13px;
}

.info small{
    color:var(--primary);
    font-weight:500;
}

/* ================= RESPONSIVE ================= */

@media (max-width:900px){

    .add-showroom-form{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .container{
        padding:12px;
    }

}
/* ================= ACCESSIBILITY ================= */

a:focus,
button:focus,
input:focus{
    outline:3px solid rgba(108,78,246,0.15);
    outline-offset:2px;
}</style>
</head>
<body>
<header class="navbar">
     <div class="logo">
        <img src="/images/logo.png" alt="DK3 Cars Logo">
        <div class="logo-text">DK3 CARS<span>Premium Showroom</span></div>  
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <ul>
            <li onclick="location.href='/dashboard'"><i class="fa fa-home"></i> Dashboard</li>
            <li class="active" onclick="location.href='/showrooms'"><i class="fas fa-store"></i> Showroom</li>
            <li onclick="location.href='/bookings'"><i class="fas fa-calendar-check"></i> Bookings</li>
            <li onclick="location.href='/sales'"><i class="fas fa-shopping-cart"></i> Sales</li>
            <li onclick="location.href='/customers'"><i class="fas fa-users"></i> Customers</li>
            <li onclick="location.href='/testdrives'"><i class="fas fa-road"></i> Test Drives</li>
            <li onclick="location.href='/staff'"><i class="fas fa-user-tie"></i> Staff</li>
            <li onclick="location.href='/finance'"><i class="fas fa-money-bill-wave"></i> Finance</li>
            <li onclick="location.href='/documents'"><i class="fas fa-file-alt"></i> Documents</li>
            <li onclick="location.href='/reports'"><i class="fas fa-chart-bar"></i> Reports</li>
            <li onclick="location.href='/notifications'"><i class="fas fa-bell"></i> Notifications</li> 
                <li class="logout" id="logoutBtn">
                    <i class="fas fa-right-from-bracket"></i>
                    <span>Logout</span>
                </li>
        </ul>
    </aside>

    <main class="main">
        <section class="panel add-showroom-panel">
            <h3 id="showroomFormTitle">Add New Showroom</h3>

            <div class="add-showroom-form">
                <input type="hidden" id="srId">
                <div class="form-group">
                    <label>Showroom Name</label>
                    <input type="text" id="srName" placeholder="Enter showroom name">
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="srCity" placeholder="Enter city">
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="srAddress" placeholder="Enter showroom address">
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" id="srContact" maxlength="10" pattern="[0-9]{10}" inputmode="numeric" placeholder="Enter 10 digit contact number">
                </div>

                <div class="form-group">
                    <label>Showroom Type</label>
                    <select id="srType">
                        <option value="Normal">Normal</option>
                        <option value="Premium">Premium</option>
                        <option value="Sales & Service">Sales & Service</option>
                        <option value="EV Experience">EV Experience</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Opening Time</label>
                    <select id="srOpenTime"></select>
                </div>

                <div class="form-group">
                    <label>Closing Time</label>
                    <select id="srCloseTime"></select>
                </div>

                <div class="form-group">
                    <label>Showroom Image</label>
                    <input type="file" id="srImage" accept="image/*" onchange="previewImage(event)">
                    <div class="preview-wrapper"><img id="previewImg" class="preview-img" alt="Preview" style="display:none"></div>
                </div>

                <button id="srAddBtn" class="btn-primary" onclick="saveShowroom()">+ Add Showroom</button>
                <div id="srStatus" style="margin-top:8px;color:#666"></div>
            </div>
        </section>
    </main>
</div>

<script src="/js/showroom-add.js"></script>
</body>
</html>
