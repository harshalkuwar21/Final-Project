<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Profile</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: #f5f8ff; color: #13223b; }
        .wrap { max-width: 760px; margin: 24px auto; padding: 0 14px; }
        .card { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 8px 20px rgba(19,34,59,.09); }
        .grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); }
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #d6e3f8; width: 100%; }
        button { border: none; background: #005bbb; color: #fff; cursor: pointer; font-weight: 600; }
        .photo { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
        .photo img { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; border: 2px solid #dbe5f5; }
        .msg { margin-top: 10px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h2>Profile Update</h2>
        <div class="photo">
            <img id="photoPreview" src="/images/logo.png" alt="profile">
            <div style="flex:1;">
                <input type="file" id="photoInput">
                <button id="uploadPhotoBtn" style="margin-top:8px;">Upload Profile Photo</button>
            </div>
        </div>

        <div class="grid">
            <input id="pFirstPage" placeholder="First Name">
            <input id="pLastPage" placeholder="Last Name">
            <input id="pEmailPage" placeholder="Email">
            <input id="pContactPage" placeholder="Contact">
            <input id="pPasswordPage" type="password" placeholder="New Password (optional)">
        </div>
        <button id="pSavePageBtn" style="margin-top:10px;">Save Profile</button>
        <div id="pMsg" class="msg"></div>
        <p style="margin-top:12px;"><a href="/user-dashboard">Back to Dashboard</a></p>
    </div>
</div>
<script src="/js/profile.js"></script>
</body>
</html>
